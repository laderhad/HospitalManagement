version: '3.9'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: HospitalManagementDb
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  web:
    build:
      context: .
      dockerfile: src/Web/Dockerfile
    depends_on:
      - db
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__HospitalManagementDb=Host=db;Port=5432;Database=HospitalManagementDb;Username=admin;Password=password;
    ports:
      - "5000:80"

volumes:
  db_data:
