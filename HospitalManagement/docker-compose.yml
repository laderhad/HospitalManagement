version: '3.9'

services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: HospitalManagementDb
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d HospitalManagementDb -h localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: src/Web/Dockerfile
    depends_on:
      - db
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__HospitalManagementDb=Host=db;Port=5432;Database=HospitalManagementDb;Username=admin;Password=password;
    ports:
      - "5000:80"

volumes:
  db_data:
