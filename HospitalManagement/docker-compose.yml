services:
  db:
    image: postgres:15
    container_name: hospitalmanagement-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-HospitalManagementDb}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-HospitalManagementDb} -h localhost",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    container_name: hospitalmanagement-web
    build:
      context: .
      dockerfile: src/Web/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: ${ASPNETCORE_URLS:-http://+:8080}
      ConnectionStrings__HospitalManagementDb: >-
        Host=db;Port=5432;Database=${POSTGRES_DB:-HospitalManagementDb};Username=${POSTGRES_USER:-admin};Password=${POSTGRES_PASSWORD:-password};
    ports:
      - "${WEB_PORT:-5001}:8080"

volumes:
  db_data:
